<script>

	$(".item_list").hide();

	var isOff = []
	for(var i = 0; i < $(".item_list").length; i++) {
		isOff.push(true)
	}
	$('.bottom_item_right').click(function() {
		var index = $('.bottom_item_right').index(this)
		if(isOff[index]) {
			$(this).text("收起")
			$(this).removeClass("item_right_down")
			$(this).addClass("item_right_up")
			$(".bottom_item_left").eq(index).addClass("item_left_hover")
			$(".item_list").eq(index).css("display", "block")
			isOff[index] = false
		} else {
			$(this).text("展开")
			$(this).addClass("item_right_down")
			$(this).removeClass("item_right_up")
			$(".bottom_item_left").eq(index).removeClass("item_left_hover")
			$(".item_list").eq(index).css("display", "none")
			isOff[index] = true
		}

	})

		}
		$(this).addClass('active')
	})

	function selectByName() {
			var aa = "/jxzw";
			var webId = "360700000000";
			var orgCode = "360701000201023000";
			var wid = "12";
			var type = "";
			
			var name = $("#shu-r-k").val();
		
			var pattern = new RegExp("[`~!@#$^&*()=|{}':;',\\[\\].<>/?~！@#￥……&*（）——|{}【】‘；：”“'。，、？%]");
		
			if(!isSql(name) || pattern.test(name))
			{
				name = name.replace(/[\'\"\\\/\b\f\n\r\t]/g, '');// 去掉转义字符 
				name= name.replace(/[\-\_\,\!\|\~\`#$\%\^\&\*\{\}\:\;\"\L\<\>\?]/g, '');// 去掉特殊字符
				name= name.replace(/[a-zA-Z_]/g, '');// 去掉英文
			}
			
			var namelen=getStringLengthForChinese(name);
			
			if( namelen> 30){
				name=name.substring(0,30)
			}
			name=$.trim(name);
			name = encodeURIComponent(name);
		
			var url = aa + "/czbm/getSxList.do?regionCode=" + webId + "&orgCode="
					+ orgCode + "&type=" + type + "&reMark=" + checkRemark ;
					
			$("#goto").attr("src",url); 
		}
		
	function isSql(strPara) {
			var bl = true;
			if(strPara != null){
				 strPara = strPara.toLowerCase();
				 if (strPara.indexOf("%") >= 0 || strPara.indexOf("|") >= 0 || strPara.indexOf("&") >= 0
						 || strPara.indexOf("+") >= 0 || strPara.indexOf("alert") >= 0
						 || strPara.indexOf("script") >= 0 || strPara.indexOf("\"") >= 0
						 || strPara.indexOf("\'") >= 0 || strPara.indexOf("<") >= 0
						 || strPara.indexOf("set") >= 0 || strPara.indexOf("exec") >= 0
						 || strPara.indexOf("delete") >= 0 || strPara.indexOf("update") >= 0
						 || strPara.indexOf("declare") >= 0 || strPara.indexOf("cast") >= 0
						 || strPara.indexOf("master") >= 0 || strPara.indexOf("or") >= 0
						 || strPara.indexOf("and") >= 0 || strPara.indexOf("select") >= 0
						 || strPara.indexOf("if") >= 0 || strPara.indexOf("sysdate") >= 0
						 || strPara.indexOf("sleep") >= 0 || strPara.indexOf("truncate") >= 0
						 || strPara.indexOf("insert") >= 0 || strPara.indexOf("waitfor") >= 0
						 || strPara.indexOf("union") >= 0 || strPara.indexOf("delay") >= 0
						 || strPara.indexOf("count") >= 0 || strPara.indexOf("_") >= 0
						 || strPara.indexOf("onmouseover") >= 0 || strPara.indexOf("prompt") >= 0) { 
					 bl = false;//有上述特殊字符出现
				 }
			}
			return bl;
		}

		function getStringLengthForChinese(val) {  
			var str = new String(val);  
			var bytesCount = 0;  
			for (var i = 0 ,n = str.length; i < n; i++) {  
				var c = str.charCodeAt(i);  
				if ((c >= 0x0001 && c <= 0x007e) || (0xff60<=c && c<=0xff9f)) {  
					bytesCount += 1;  
				} else {  
					bytesCount += 2;  
				}  
			}  
			return (bytesCount/2).toFixed(0);  
		}
