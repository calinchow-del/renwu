<script type="text/javascript">
	window.onload = function() {

	}
	n = $('.anan ul li').length;

	$('.anan').addClass('anzt-zt').show();
	//		$('.sfgw').text($('.anan ul li').eq(0).find('a').text());
	$('.anbm').click(
			function() {
				$(this).addClass('anzt-zt').siblings(this).removeClass(
						'anzt-zt');
				$('.anbm-b').eq($(this).index()).siblings('.anbm-b')
						.removeClass('anan').hide();
				$('.anbm-b').eq($(this).index()).addClass('anan').show();
				$('.anbm-c').eq($(this).index()).siblings('.anbm-c')
						.removeClass('anan').hide();
				$('.anbm-c').eq($(this).index()).addClass('anan').show();
				//			$('.sfgw').text($('.anan ul li').eq(0).find('a').text());

				$('.anan ul li').click(
						function() {
							//				$('.sfgw').text($('.anan ul li').eq($(this).index()).find('a').text());
							$('.sfgw-ml .anan   li').eq($(this).index())
									.siblings('.sfgw-ml .anan   li')
									.removeClass('anan').hide();
							$('.sfgw-ml .anan li').eq($(this).index())
									.addClass('anan').show();
						});

			});
</script>

<script type="text/javascript">
	window.onload = function() {

	$(function(){
		var kind = "";
		var orgId = "360701000201004000"
		if (kind != "") {
			gotoUrl('360700000000',kind,'');
		} else if(orgId != "") {
			gotoUrl('360700000000','',orgId);
			$('#azt').click();
		}else{
			gotoUrl('360700000000','0','');
		}
	});
	
	function gotoUrl(webId, kind, orgId) {
		var aa = "/jxzw";
		var wid = $("#wid").val().replace(/^\s\s*/, '' ).replace(/\s\s*$/, '' );
		var url = aa + "/ggfw/gotoRight.do?webId=" + webId + "&orgId=" 
				+ orgId + "&kind=" + kind + "&wid=" + wid;
		document.getElementById("goto").src = url;
	}
</script>
